		<style>
			/* ========== CORRECTIF overflow pour les poissons ========== */
			/* Le body a overflow:hidden dans style.css — on crée une couche dédiée */
			#poisson-layer {
				position: fixed;
				inset: 0;
				pointer-events: none;
				z-index: 9999;
				overflow: visible;
			}

			/* ========== POISSON D'AVRIL ========== */
			.poisson {
				position: absolute;
				pointer-events: none;
				font-size: 2rem;
				animation: volerPoisson 3.5s ease-out forwards;
				user-select: none;
				will-change: transform, opacity;
			}
			@keyframes volerPoisson {
				0%   { opacity: 1; transform: translateY(0)    rotate(0deg)   scale(1);   }
				40%  {             transform: translateY(-140px) rotate(25deg)  scale(1.4); }
				100% { opacity: 0; transform: translateY(-320px) rotate(-20deg) scale(0.4); }
			}

			/* ========== VIGNETTES : on neutralise la transition du CSS d'origine ========== */
			/* style.css met transition:0.1s sur .container div — on laisse nos animations prendre le dessus */
			.container a,
			.container > div {
				position: relative;   /* nécessaire pour transform */
				transition: transform 0.35s cubic-bezier(.36,.07,.19,.97) !important;
			}

			/* ========== MESSAGE D'ERREUR WINDOWS 98 ========== */
			#fakeError {
				display: none;
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				background: #c0c0c0;
				border: 3px solid #fff;
				border-right-color: #808080;
				border-bottom-color: #808080;
				padding: 0;
				z-index: 99999;
				width: 340px;
				font-family: 'MS Sans Serif', Arial, sans-serif;
				font-size: 13px;
				box-shadow: 4px 4px 10px rgba(0,0,0,0.6);
				animation: popIn 0.2s ease-out;
			}
			@keyframes popIn {
				from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
				to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
			}
			#fakeError .titlebar {
				background: linear-gradient(to right, #000080, #1084d0);
				color: white;
				padding: 4px 6px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				font-weight: bold;
				font-size: 12px;
			}
			#fakeError .titlebar .close-btn {
				cursor: pointer;
				background: #c0c0c0;
				color: #000;
				border: 2px solid #fff;
				border-right-color: #808080;
				border-bottom-color: #808080;
				padding: 0 6px;
				font-size: 12px;
				line-height: 18px;
				font-weight: bold;
			}
			#fakeError .body {
				padding: 16px 20px;
				display: flex;
				align-items: flex-start;
				gap: 14px;
				background: #c0c0c0;
			}
			#fakeError .icon {
				font-size: 2.5rem;
				line-height: 1;
				flex-shrink: 0;
			}
			#fakeError .msg {
				flex: 1;
				line-height: 1.6;
				color: #000;
			}
			#fakeError .btns {
				text-align: center;
				padding: 8px 8px 12px;
				background: #c0c0c0;
			}
			#fakeError .btns button {
				background: #c0c0c0;
				border: 2px solid #fff;
				border-right-color: #808080;
				border-bottom-color: #808080;
				padding: 5px 22px;
				cursor: pointer;
				font-size: 13px;
				font-family: inherit;
				font-weight: bold;
			}
			#fakeError .btns button:active {
				border-color: #808080;
				border-right-color: #fff;
				border-bottom-color: #fff;
			}

			/* ========== RETOURNEMENT DES IMAGES ========== */
			.container.flip-mode img {
				transform: rotate(180deg) !important;
				transition: transform 0.7s ease !important;
			}
		</style>

<script>
// ============================================================
//  HEURE DE CODE – SURPRISES 1er AVRIL
//  Déclenchées au mouvement de la souris
// ============================================================

var container     = document.getElementById("mainContainer");
var fakeErrorDiv  = document.getElementById("fakeError");
var poissonLayer  = document.getElementById("poisson-layer");

// ---- état ----
var surpriseActive   = false;
var errorShown       = false;
var mouseMoveCnt     = 0;
var mouseMoveThresh  = 30;    // nb de mouvements avant 1ère surprise
var lastSurprise     = 0;
var surpriseCooldown = 7000;  // ms entre deux surprises

// ---- catalogue de messages d'erreur rigolos ----
var erreurs = [
	{
		titre : "⚠️ Erreur Système",
		icone : "🐟",
		texte : "<strong>POISSON_D_AVRIL.exe</strong> a été détecté !<br><br>Erreur critique :<br><em>\"Trop de poissons en mémoire vive.\"</em><br><br>Veuillez redémarrer votre cerveau. 🧠"
	},
	{
		titre : "🐠 Alerte Poisson",
		icone : "🎣",
		texte : "<strong>Attention !</strong><br><br>Quelqu'un a collé un poisson dans votre dos.<br><em>L'ordinateur aussi.</em><br><br>Système infecté à 100% de bonne humeur."
	},
	{
		titre : "💥 Erreur Fatale",
		icone : "🤪",
		texte : "<strong>CERVEAU_ENFANT.dll</strong> introuvable.<br><br>Solution recommandée :<br><em>Coder quelque chose de rigolo.</em><br><br>Bonne Heure de Code ! 🚀"
	},
	{
		titre : "🖥️ Windows 1er Avril",
		icone : "😂",
		texte : "Le clavier a disparu.<br><br><em>Pour récupérer votre clavier,<br>retournez l'écran à l'envers.</em><br><br>(C'est une blague. Ou pas ?)"
	}
];
var erreurIndex = 0;

// ============================================================
//  POISSONS QUI VOLENT — injectés dans #poisson-layer
//  (évite le overflow:hidden du body dans style.css)
// ============================================================
var poissons = ["🐟","🐠","🐡","🎣","🦈","🐙"];

function lancerPoisson(x, y) {
	var el = document.createElement("div");
	el.classList.add("poisson");
	el.textContent = poissons[Math.floor(Math.random() * poissons.length)];
	// position relative à la couche fixed
	el.style.left      = (x + Math.random()*80 - 40) + "px";
	el.style.top       = (y + Math.random()*60 - 30) + "px";
	el.style.fontSize  = (1.5 + Math.random()*2) + "rem";
	poissonLayer.appendChild(el);
	setTimeout(function(){ el.remove(); }, 3600);
}

// ============================================================
//  VIGNETTES QUI SE DÉPLACENT (sautent quand la souris passe)
// ============================================================
var links = container.querySelectorAll("a");

links.forEach(function(link) {
	link.addEventListener("mouseenter", function(){
		if (!surpriseActive) return;
		var dx = (Math.random() - 0.5) * 220;
		var dy = (Math.random() - 0.5) * 220;
		link.style.transform = "translate("+dx+"px, "+dy+"px) rotate("+(Math.random()*30-15)+"deg) scale("+(0.8+Math.random()*0.6)+")";
	});
	link.addEventListener("mouseleave", function(){
		if (!surpriseActive) return;
		// revient en place après un délai
		setTimeout(function(){
			link.style.transform = "";
		}, 600 + Math.random()*400);
	});
});

// ============================================================
//  RETOURNER LES IMAGES
// ============================================================
function activerFlip() {
	container.classList.add("flip-mode");
	flipActive = true;
	setTimeout(function(){
		container.classList.remove("flip-mode");
		flipActive = false;
	}, 5000);
}

// ============================================================
//  FAUX MESSAGE D'ERREUR
// ============================================================
function montrerFakeError() {
	if (errorShown) return;
	errorShown = true;
	var e = erreurs[erreurIndex % erreurs.length];
	erreurIndex++;
	fakeErrorDiv.querySelector(".titlebar span:first-child").textContent = e.titre;
	fakeErrorDiv.querySelector(".icon").textContent = e.icone;
	fakeErrorDiv.querySelector(".msg").innerHTML = e.texte;
	fakeErrorDiv.style.display = "block";
}

function closeFakeError() {
	fakeErrorDiv.style.display = "none";
	errorShown = false;
}

// ============================================================
//  ORCHESTRATEUR DE SURPRISES
// ============================================================
var surpriseQueue = ["poissons", "flip", "erreur", "poissons", "chaos"];
var surpriseIdx   = 0;

function declencherSurprise(x, y) {
	var now = Date.now();
	if (now - lastSurprise < surpriseCooldown) return;
	lastSurprise = now;

	var type = surpriseQueue[surpriseIdx % surpriseQueue.length];
	surpriseIdx++;

	switch(type) {

		case "poissons":
			surpriseActive = true;
			// Faire pleuvoir 8 poissons autour du curseur
			for (var i = 0; i < 8; i++) {
				(function(delay){
					setTimeout(function(){
						lancerPoisson(x, y);
					}, delay);
				})(i * 150);
			}
			setTimeout(function(){ surpriseActive = false; }, 4000);
			break;

		case "flip":
			activerFlip();
			// quelques poissons aussi
			for (var j = 0; j < 4; j++) {
				(function(d){ setTimeout(function(){ lancerPoisson(x, y); }, d); })(j*200);
			}
			break;

		case "erreur":
			montrerFakeError();
			break;

		case "chaos":
			// Toutes les vignettes partent en vrille !
			surpriseActive = true;
			links.forEach(function(link){
				var dx = (Math.random()-0.5)*300;
				var dy = (Math.random()-0.5)*300;
				link.style.transition = "transform 0.4s cubic-bezier(.36,.07,.19,.97)";
				link.style.transform  = "translate("+dx+"px,"+dy+"px) rotate("+(Math.random()*45-22)+"deg)";
			});
			// quelques poissons
			for (var k = 0; k < 6; k++) {
				(function(d){ setTimeout(function(){ lancerPoisson(x, y); }, d); })(k*120);
			}
			// tout revient en place
			setTimeout(function(){
				links.forEach(function(link){
					link.style.transition = "transform 0.7s ease";
					link.style.transform  = "";
				});
				surpriseActive = false;
			}, 3000);
			break;
	}
}

// ============================================================
//  ÉCOUTEUR SOURIS
// ============================================================
document.addEventListener("mousemove", function(e) {
	mouseMoveCnt++;

	// Poisson léger qui suit le curseur (1 chance sur 40)
	if (surpriseActive && Math.random() < 0.025) {
		lancerPoisson(e.clientX, e.clientY);
	}

	// Déclencher une surprise après le seuil initial, puis selon cooldown
	if (mouseMoveCnt >= mouseMoveThresh) {
		declencherSurprise(e.clientX, e.clientY);
	}
});

// ============================================================
//  HEURE (logique originale conservée)
// ============================================================
var hid  = document.getElementById("hid");
var div1 = document.getElementById("div1");

function checkTime(){
	var d      = new Date();
	var hour   = d.getHours();
	var minute = d.getMinutes();
	div1.innerHTML = hour + " " + minute;
	if (hour==11&&minute>49 || hour==14&&minute>49 || hour==15&&minute<10) { hid.style.visibility="visible"; }
	if (hour==12&&minute>10 || hour==15&&minute>10)                        { hid.style.visibility="hidden";  }
	if (hour==16&&minute>49 || hour==17&&minute<10)                        { hid.style.visibility="visible"; }
}
checkTime();
setInterval(checkTime, 60000);
</script>

</script>
