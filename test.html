<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Test Mémoire</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #ff9955;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── SVG plein écran ── */
  #mysvg {
    display: block;
    position: absolute;
    top: 0; left: 0;
    cursor: crosshair;
  }

  /* ── Chrono ── */
  #chrono {
    position: fixed;
    top: 12px; right: 16px;
    font-size: 28px;
    font-weight: bold;
    color: rgba(255,255,255,0.85);
    z-index: 10;
    pointer-events: none;
    letter-spacing: 1px;
  }

  /* ── Score courant ── */
  #score-display {
    position: fixed;
    top: 12px; left: 16px;
    font-size: 22px;
    font-weight: bold;
    color: rgba(255,255,255,0.75);
    z-index: 10;
    pointer-events: none;
  }

  /* ── Écrans plein écran (intro / fin) ── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 24px;
  }

  /* ── Écran intro ── */
  #screen-intro {
    background: rgba(0,0,0,0.55);
    color: #fff;
  }
  #screen-intro h1 {
    font-size: clamp(28px, 6vw, 64px);
    margin-bottom: 16px;
  }
  #screen-intro p {
    font-size: clamp(14px, 2.5vw, 22px);
    max-width: 520px;
    line-height: 1.6;
    margin-bottom: 32px;
    color: rgba(255,255,255,0.85);
  }

  /* ── Écran résultat ── */
  #screen-result {
    display: none;
    background: rgba(0,0,0,0.6);
    color: #fff;
  }
  #screen-result h1 {
    font-size: clamp(32px, 7vw, 80px);
    margin-bottom: 12px;
  }
  #screen-result .sub {
    font-size: clamp(16px, 3vw, 28px);
    color: rgba(255,255,255,0.8);
    margin-bottom: 36px;
  }

  /* ── Bouton ── */
  .btn {
    background: #ff9955;
    color: #fff;
    border: none;
    border-radius: 40px;
    padding: 14px 40px;
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: bold;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn:hover { background: #e8843a; }
  .btn:active { transform: scale(0.97); }

  /* ── Flash de feedback ── */
  #flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 40;
    opacity: 0;
    transition: opacity 0.15s;
  }
</style>
</head>
<body>

<!-- SVG de jeu -->
<svg id="mysvg" width="0" height="0"></svg>

<!-- Chrono -->
<div id="chrono"></div>

<!-- Score -->
<div id="score-display"></div>

<!-- Flash feedback -->
<div id="flash"></div>

<!-- Écran d'introduction -->
<div id="screen-intro" class="screen">
  <h1>🧠 Test Mémoire</h1>
  <p>
    9 chiffres apparaissent sur la grille.<br>
    Mémorise-les, puis clique sur les cases<br>
    <strong>dans l'ordre croissant</strong> le plus vite possible !
  </p>
  <button class="btn" onclick="demarrer()">C'est parti !</button>
</div>

<!-- Écran résultat -->
<div id="screen-result" class="screen">
  <h1 id="result-title"></h1>
  <div class="sub" id="result-sub"></div>
  <button class="btn" onclick="recommencer()">Rejouer</button>
</div>

<script>
  /* ─── Variables ─── */
  var ww, wh, a, a2, b;
  var arr = [];
  var clickn = 0, score = 0;
  var time = 0, timerID = null, chronoID = null;
  var masqueActif = false;
  var jeuEnCours = false;

  var mysvg    = document.getElementById("mysvg");
  var chronoEl = document.getElementById("chrono");
  var scoreEl  = document.getElementById("score-display");
  var flashEl  = document.getElementById("flash");
  var screenResult = document.getElementById("screen-result");

  /* ─── Init dimensions ─── */
  function initDim() {
    ww = window.innerWidth;
    wh = window.innerHeight;
    a  = Math.round(ww / 8);
    a2 = Math.round(a / 2);
    b  = Math.round(wh / 5);
  }

  /* ─── Colonne X d'un numéro de case (1-40) ─── */
  function colX(n) { return ((n - 1) % 8) * a; }
  function rowY(n) { return Math.floor((n - 1) / 8) * b; }

  /* ─── Construire la grille SVG ─── */
  function construireGrille() {
    mysvg.innerHTML = "";
    mysvg.setAttribute("width", ww);
    mysvg.setAttribute("height", wh);

    /* Grille de fond */
    for (var i = 0; i <= 8; i++) {
      var lv = document.createElementNS(mysvg.namespaceURI, "line");
      lv.setAttribute("x1", i * a); lv.setAttribute("y1", 0);
      lv.setAttribute("x2", i * a); lv.setAttribute("y2", wh);
      lv.setAttribute("stroke", "rgba(0,0,0,0.15)"); lv.setAttribute("stroke-width", "1");
      mysvg.appendChild(lv);
    }
    for (var j = 0; j <= 5; j++) {
      var lh = document.createElementNS(mysvg.namespaceURI, "line");
      lh.setAttribute("x1", 0);  lh.setAttribute("y1", j * b);
      lh.setAttribute("x2", ww); lh.setAttribute("y2", j * b);
      lh.setAttribute("stroke", "rgba(0,0,0,0.15)"); lh.setAttribute("stroke-width", "1");
      mysvg.appendChild(lh);
    }

    /* Chiffres et masques */
    for (var k = 1; k <= 9; k++) {
      var cx = colX(arr[k]) + a2;
      var cy = rowY(arr[k]) + b * 0.62;
      var fs = Math.round(a * 0.55);

      /* Masque (rect noir) */
      var rect = document.createElementNS(mysvg.namespaceURI, "rect");
      rect.setAttribute("id", "r" + k);
      rect.setAttribute("x",      colX(arr[k]));
      rect.setAttribute("y",      rowY(arr[k]));
      rect.setAttribute("width",  a);
      rect.setAttribute("height", b);
      rect.setAttribute("fill",   "rgba(0,0,0,0.45)");
      rect.setAttribute("opacity", "0");
      mysvg.appendChild(rect);

      /* Chiffre */
      var txt = document.createElementNS(mysvg.namespaceURI, "text");
      txt.setAttribute("id",          "n" + k);
      txt.setAttribute("x",           cx);
      txt.setAttribute("y",           cy);
      txt.setAttribute("font-size",   fs);
      txt.setAttribute("text-anchor", "middle");
      txt.setAttribute("fill",        "rgba(255,255,255,0.85)");
      txt.setAttribute("font-family", "sans-serif");
      txt.setAttribute("font-weight", "bold");
      txt.textContent = k; /* on affiche 1..9 dans l'ordre de mémorisation */
      mysvg.appendChild(txt);
    }
  }

  /* ─── Démarrer le jeu ─── */
  function demarrer() {
    document.getElementById("screen-intro").style.display = "none";
    scoreEl.textContent = "0 / 9";
    lancer();
  }

  function lancer() {
    /* Générer 9 cases aléatoires dans 1..40 */
    arr = [0];
    while (arr.length < 10) {
      var r = Math.floor(Math.random() * 40) + 1;
      if (arr.indexOf(r) === -1) arr.push(r);
    }

    clickn = 0; score = 0; time = 0; masqueActif = false; jeuEnCours = true;

    initDim();
    construireGrille();

    /* Chrono */
    chronoEl.textContent = "0.0";
    clearInterval(chronoID);
    chronoID = setInterval(function() {
      if (jeuEnCours) {
        time += 100;
        chronoEl.textContent = (time / 1000).toFixed(1) + " s";
      }
    }, 100);

    /* Masquage automatique après 5 secondes */
    clearTimeout(timerID);
    timerID = setTimeout(masquer, 5000);
  }

  /* ─── Masquer les chiffres ─── */
  function masquer() {
    masqueActif = true;
    for (var i = 1; i <= 9; i++) {
      var r = document.getElementById("r" + i);
      if (r) r.setAttribute("opacity", "1");
    }
  }

  /* ─── Clic sur la grille ─── */
  mysvg.addEventListener("click", function(e) {
    if (!jeuEnCours) return;

    var ex = e.clientX, ey = e.clientY;
    var coln = Math.floor(ex / a) + 1;
    var rown = Math.floor(ey / b) + 1;
    var rectn = (rown - 1) * 8 + coln;

    clickn++;
    if (clickn > 9) return;

    if (rectn === arr[clickn]) {
      /* Bonne case */
      score++;
      scoreEl.textContent = score + " / 9";
      var nEl = document.getElementById("n" + clickn);
      var rEl = document.getElementById("r" + clickn);
      if (nEl) nEl.setAttribute("opacity", "0");
      if (rEl) rEl.setAttribute("opacity", "0");

      if (score === 9) {
        jeuEnCours = false;
        clearInterval(chronoID);
        var sec = (time / 1000).toFixed(2);
        showResult("🎉 Bravo !", "Tu as trouvé les 9 chiffres en " + sec + " seconde(s) !");
      }
    } else {
      /* Mauvaise case — feedback rouge puis game over */
      jeuEnCours = false;
      clearInterval(chronoID);
      flashEcran("rgba(220,30,30,0.35)");
      /* Révéler toutes les cases pour voir les erreurs */
      masquer();
      /* Montrer où était la bonne réponse */
      var bonEl = document.getElementById("n" + clickn);
      if (bonEl) {
        bonEl.setAttribute("fill", "#ffe066");
        bonEl.setAttribute("opacity", "1");
        var bonR = document.getElementById("r" + clickn);
        if (bonR) bonR.setAttribute("opacity", "0");
      }
      setTimeout(function() {
        showResult("😅 Perdu !", "Tu t'es trompé(e) au chiffre " + clickn + ".<br>La case en jaune était la bonne.");
      }, 600);
    }
  });

  /* ─── Flash de feedback ─── */
  function flashEcran(couleur) {
    flashEl.style.background = couleur;
    flashEl.style.opacity = "1";
    setTimeout(function() { flashEl.style.opacity = "0"; }, 300);
  }

  /* ─── Afficher l'écran résultat ─── */
  function showResult(titre, sub) {
    document.getElementById("result-title").textContent = titre;
    document.getElementById("result-sub").innerHTML = sub;
    screenResult.style.display = "flex";
  }

  /* ─── Rejouer ─── */
  function recommencer() {
    screenResult.style.display = "none";
    scoreEl.textContent = "0 / 9";
    chronoEl.textContent = "";
    lancer();
  }

  /* ─── Redimensionnement ─── */
  window.addEventListener("resize", function() {
    if (jeuEnCours) {
      initDim();
      construireGrille();
    }
  });
</script>
</body>
</html>
