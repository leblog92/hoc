<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Test Mémoire</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #ff9955;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Écrans (intro + résultat) ── */
  .ecran {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    z-index: 100;
    color: #fff;
  }

  /* ── Écran intro : image de fond uniquement ici ── */
  #ecran-intro {
    background: rgba(0, 0, 0, 0.55);
    overflow: hidden;
    position: fixed; /* nécessaire pour ::before */
  }
  #ecran-intro::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('img/test_background.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0.3;
    z-index: 0;
  }
  #ecran-intro > * { position: relative; z-index: 1; }

  #ecran-intro h1  { font-size: clamp(28px, 6vw, 64px); margin-bottom: 16px; }
  #ecran-intro p   {
    font-size: clamp(14px, 2.2vw, 20px);
    max-width: 500px; line-height: 1.7;
    margin-bottom: 32px;
    color: rgba(255,255,255,.88);
  }

  /* ── Écran résultat ── */
  #ecran-resultat {
    display: none;
    background: rgba(0, 0, 0, 0.65);
  }
  #ecran-resultat h1  { font-size: clamp(36px, 7vw, 80px); margin-bottom: 10px; }
  #ecran-resultat .sub {
    font-size: clamp(15px, 2.5vw, 24px);
    color: rgba(255,255,255,.80);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .btns { display: flex; flex-direction: column; gap: 14px; align-items: center; }

  /* ── Boutons ── */
  .btn {
    background: #ff9955; color: #fff;
    border: none; border-radius: 40px;
    padding: 13px 38px;
    font-size: clamp(15px, 2.2vw, 20px);
    font-weight: bold; cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn:hover  { background: #e8843a; }
  .btn:active { transform: scale(.97); }
  .btn-defi   { background: #7c3aed; }
  .btn-defi:hover { background: #6d28d9; }

  /* ── HUD (chrono + niveau) ── */
  #hud-chrono {
    position: fixed; top: 12px; right: 16px;
    font-size: 26px; font-weight: bold;
    color: rgba(255,255,255,.88);
    z-index: 10; pointer-events: none;
  }
  #hud-niveau {
    position: fixed; top: 12px; left: 16px;
    font-size: 18px; font-weight: bold;
    color: rgba(255,255,255,.75);
    z-index: 10; pointer-events: none;
  }

  /* ── Flash feedback ── */
  #flash {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 90;
    opacity: 0; transition: opacity .15s;
  }
</style>
</head>
<body>

<!-- SVG plein écran -->
<svg id="mysvg" style="display:block;position:absolute;top:0;left:0;" width="0" height="0"></svg>

<!-- HUD -->
<div id="hud-chrono"></div>
<div id="hud-niveau"></div>

<!-- Flash -->
<div id="flash"></div>

<!-- ══ ÉCRAN INTRO ══ -->
<div id="ecran-intro" class="ecran">
  <h1>🧠 Test Mémoire</h1>
  <p>
    9 chiffres s'affichent brièvement sur la grille.<br>
    Mémorise leur position, puis clique dessus<br>
    <strong>dans l'ordre 1 → 9</strong> le plus vite possible.<br><br>
    Les cases sont entièrement masquées avant que tu cliques.<br>
    Tu commences avec <strong>3 secondes</strong> d'affichage.<br>
    Si tu réussis, le temps diminue !
  </p>
  <button class="btn" onclick="demarrer()">C'est parti !</button>
</div>

<!-- ══ ÉCRAN RÉSULTAT ══ -->
<div id="ecran-resultat" class="ecran">
  <h1 id="res-titre"></h1>
  <div class="sub" id="res-sous"></div>
  <div class="btns" id="res-btns"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   VARIABLES GLOBALES
═══════════════════════════════════════════════════ */
var ww, wh, a, a2, b;          // dimensions grille
var arr = [];                   // arr[1..9] = numéros de case (1-40) pour chaque chiffre
var clickn = 0, score = 0;
var temps = 0;                  // chrono en ms
var chronoID = null, masqueID = null, cdID = null;
var enJeu = false;
var tempsAffichage = 3000;      // ms — réduit à chaque victoire

var mysvg    = document.getElementById("mysvg");
var hudChron = document.getElementById("hud-chrono");
var hudNiv   = document.getElementById("hud-niveau");
var flashEl  = document.getElementById("flash");
var ecranRes = document.getElementById("ecran-resultat");

/* ═══════════════════════════════════════════════════
   UTILITAIRES POSITION
═══════════════════════════════════════════════════ */
// case n (1-40) : colonne 0-7, ligne 0-4
function caseCol(n) { return ((n - 1) % 8); }
function caseLig(n) { return Math.floor((n - 1) / 8); }
function caseX(n)   { return caseCol(n) * a; }
function caseY(n)   { return caseLig(n) * b; }
function caseCX(n)  { return caseX(n) + a2; }          // centre X
function caseCY(n)  { return caseY(n) + Math.round(b * 0.5 + a2 * 0.36); } // centre Y visuel

/* ═══════════════════════════════════════════════════
   INIT DIMENSIONS
═══════════════════════════════════════════════════ */
function initDim() {
  ww = window.innerWidth;
  wh = window.innerHeight;
  a  = Math.floor(ww / 8);
  a2 = Math.floor(a / 2);
  b  = Math.floor(wh / 5);
}

/* ═══════════════════════════════════════════════════
   CONSTRUIRE LA GRILLE
═══════════════════════════════════════════════════ */
function construireGrille() {
  mysvg.innerHTML = "";
  mysvg.setAttribute("width",  ww);
  mysvg.setAttribute("height", wh);

  var ns = mysvg.namespaceURI;

  /* Lignes verticales */
  for (var i = 0; i <= 8; i++) {
    var lv = document.createElementNS(ns, "line");
    lv.setAttribute("x1", i * a); lv.setAttribute("y1", 0);
    lv.setAttribute("x2", i * a); lv.setAttribute("y2", wh);
    lv.setAttribute("stroke", "rgba(0,0,0,0.2)");
    lv.setAttribute("stroke-width", "1");
    mysvg.appendChild(lv);
  }
  /* Lignes horizontales */
  for (var j = 0; j <= 5; j++) {
    var lh = document.createElementNS(ns, "line");
    lh.setAttribute("x1", 0);  lh.setAttribute("y1", j * b);
    lh.setAttribute("x2", ww); lh.setAttribute("y2", j * b);
    lh.setAttribute("stroke", "rgba(0,0,0,0.2)");
    lh.setAttribute("stroke-width", "1");
    mysvg.appendChild(lh);
  }

  var fs = Math.round(a * 0.55); // taille de fonte

  for (var k = 1; k <= 9; k++) {
    var cx = caseCX(arr[k]);
    var cy = caseCY(arr[k]);

    /* ── Chiffre ── */
    var txt = document.createElementNS(ns, "text");
    txt.setAttribute("id",          "n" + k);
    txt.setAttribute("x",           cx);
    txt.setAttribute("y",           cy);
    txt.setAttribute("font-size",   fs);
    txt.setAttribute("text-anchor", "middle");
    txt.setAttribute("fill",        "rgba(255,255,255,0.92)");
    txt.setAttribute("font-weight", "bold");
    txt.setAttribute("font-family", "sans-serif");
    txt.setAttribute("opacity",     "1");
    txt.textContent = k;
    mysvg.appendChild(txt);

    /* ── Masque (rect opaque même couleur que fond) ──
       opacity = 0 pendant l'affichage, passe à 1 pour occulter TOTALEMENT */
    var rect = document.createElementNS(ns, "rect");
    rect.setAttribute("id",      "r" + k);
    rect.setAttribute("x",       caseX(arr[k]));
    rect.setAttribute("y",       caseY(arr[k]));
    rect.setAttribute("width",   a);
    rect.setAttribute("height",  b);
    rect.setAttribute("fill",    "#000000");   /* même couleur que le fond → invisible total */
    rect.setAttribute("opacity", "0");
    mysvg.appendChild(rect);
  }
}

/* ═══════════════════════════════════════════════════
   MASQUER / RÉVÉLER
═══════════════════════════════════════════════════ */
function masquerTout() {
  for (var i = 1; i <= 9; i++) {
    var r = document.getElementById("r" + i);
    if (r) r.setAttribute("opacity", "1");
  }
}

function cacherChiffre(k) {
  var n = document.getElementById("n" + k);
  var r = document.getElementById("r" + k);
  if (n) n.setAttribute("opacity", "0");
  if (r) r.setAttribute("opacity", "0");
}

/* ═══════════════════════════════════════════════════
   DÉMARRER / LANCER
═══════════════════════════════════════════════════ */
function demarrer() {
  document.getElementById("ecran-intro").style.display = "none";
  lancer();
}

function lancer() {
  /* Générer 9 positions uniques parmi 1-40 */
  arr = [0];
  while (arr.length < 10) {
    var r = Math.floor(Math.random() * 40) + 1;
    if (arr.indexOf(r) === -1) arr.push(r);
  }

  clickn = 0; score = 0; temps = 0; enJeu = false;

  clearInterval(chronoID);
  clearTimeout(masqueID);
  clearInterval(cdID);

  initDim();
  construireGrille();

  hudNiv.textContent   = "⏱ " + (tempsAffichage / 1000).toFixed(1) + " s";
  hudChron.textContent = "";

  /* ── Compte à rebours 3…2…1 ── */
  var cd = 3;
  hudChron.textContent = cd + "…";
  cdID = setInterval(function () {
    cd--;
    if (cd > 0) {
      hudChron.textContent = cd + "…";
    } else {
      clearInterval(cdID);
      /* ── Phase MÉMORISATION : chiffres visibles ── */
      hudChron.textContent = "MÉMORISE !";
      /* ── Après tempsAffichage : masquer tout ── */
      masqueID = setTimeout(function () {
        masquerTout();
        /* ── Phase JEU : lancer le chrono ── */
        enJeu = true;
        temps = 0;
        hudChron.textContent = "0.0 s";
        hudNiv.textContent   = "0 / 9  —  ⏱ " + (tempsAffichage / 1000).toFixed(1) + " s";
        chronoID = setInterval(function () {
          if (enJeu) {
            temps += 100;
            hudChron.textContent = (temps / 1000).toFixed(1) + " s";
          }
        }, 100);
      }, tempsAffichage);
    }
  }, 1000);
}

/* ═══════════════════════════════════════════════════
   CLICS
═══════════════════════════════════════════════════ */
mysvg.addEventListener("click", function (e) {
  if (!enJeu) return;

  var coln  = Math.floor(e.clientX / a);           // 0-7
  var rown  = Math.floor(e.clientY / b);            // 0-4
  var rectn = rown * 8 + coln + 1;                 // 1-40

  clickn++;
  if (clickn > 9) return;

  if (rectn === arr[clickn]) {
    /* ✅ Bonne case */
    score++;
    hudNiv.textContent = score + " / 9  —  ⏱ " + (tempsAffichage / 1000).toFixed(1) + " s";
    cacherChiffre(clickn);

    if (score === 9) {
      enJeu = false;
      clearInterval(chronoID);
      var sec = (temps / 1000).toFixed(2);
      var prochainTemps = Math.max(500, tempsAffichage - 500);
      afficherResultat(
        "🎉 Bravo !",
        "9 / 9 en <strong>" + sec + " s</strong> — affichage : " + (tempsAffichage / 1000).toFixed(1) + " s",
        true, prochainTemps
      );
    }
  } else {
    /* ❌ Mauvaise case */
    enJeu = false;
    clearInterval(chronoID);
    flash("rgba(200,0,0,0.3)");

    /* Révéler toutes les cases restantes + mettre en jaune la bonne */
    masquerTout();
    var bonN = document.getElementById("n" + clickn);
    var bonR = document.getElementById("r" + clickn);
    if (bonN) { bonN.setAttribute("fill", "#ffe066"); bonN.setAttribute("opacity", "1"); }
    if (bonR) bonR.setAttribute("opacity", "0");

    setTimeout(function () {
      afficherResultat(
        "😅 Perdu !",
        "Raté au chiffre <strong>" + clickn + "</strong> — la case en jaune était la bonne.<br>Affichage : " + (tempsAffichage / 1000).toFixed(1) + " s",
        false, tempsAffichage
      );
    }, 800);
  }
});

/* ═══════════════════════════════════════════════════
   RÉSULTAT
═══════════════════════════════════════════════════ */
function afficherResultat(titre, sous, victoire, prochainTemps) {
  document.getElementById("res-titre").textContent = titre;
  document.getElementById("res-sous").innerHTML    = sous;

  var btns = document.getElementById("res-btns");
  btns.innerHTML = "";

  if (victoire && prochainTemps < tempsAffichage) {
    var b1 = document.createElement("button");
    b1.className   = "btn btn-defi";
    b1.textContent = "⚡ Plus difficile — " + (prochainTemps / 1000).toFixed(1) + " s";
    b1.onclick = function () { tempsAffichage = prochainTemps; rejouer(); };
    btns.appendChild(b1);
  }

  var b2 = document.createElement("button");
  b2.className   = "btn";
  b2.textContent = victoire
    ? "↺ Rejouer — " + (tempsAffichage / 1000).toFixed(1) + " s"
    : "↺ Réessayer";
  b2.onclick = rejouer;
  btns.appendChild(b2);

  ecranRes.style.display = "flex";
}

function rejouer() {
  ecranRes.style.display = "none";
  lancer();
}

/* ═══════════════════════════════════════════════════
   FLASH
═══════════════════════════════════════════════════ */
function flash(couleur) {
  flashEl.style.background = couleur;
  flashEl.style.opacity    = "1";
  setTimeout(function () { flashEl.style.opacity = "0"; }, 350);
}

/* ═══════════════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════════════ */
window.addEventListener("resize", function () {
  if (enJeu) { initDim(); construireGrille(); }
});
</script>
</body>
</html>
